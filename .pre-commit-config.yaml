# Azure Voice Language Lab - Pre-commit Configuration
# ==================================================
#
# Configuração de hooks do pre-commit para garantir qualidade do código

# Versão mínima do pre-commit
minimum_pre_commit_version: "2.20.0"

# Repositório padrão do pre-commit
default_stages: [commit]

# Configuração dos hooks
repos:
  # Hooks gerais do pre-commit
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Verifica se há arquivos grandes no commit
      - id: check-added-large-files
        args: ['--maxkb=1000']
        name: Verificar arquivos grandes

      # Verifica se há conflitos de merge
      - id: check-merge-conflict
        name: Verificar conflitos de merge

      # Verifica se há arquivos com nomes problemáticos
      - id: check-case-conflict
        name: Verificar conflitos de case

      # Verifica se há arquivos JSON válidos
      - id: check-json
        name: Verificar arquivos JSON

      # Verifica se há arquivos YAML válidos
      - id: check-yaml
        name: Verificar arquivos YAML

      # Verifica se há arquivos TOML válidos
      - id: check-toml
        name: Verificar arquivos TOML

      # Verifica se há arquivos AST válidos
      - id: check-ast
        name: Verificar sintaxe Python

      # Verifica se há shebangs
      - id: check-shebang-scripts-are-executable
        name: Verificar shebangs

      # Verifica se há linhas muito longas
      - id: check-toml
        name: Verificar linhas longas
        args: ['--maxlen=100']

      # Remove espaços em branco no final das linhas
      - id: trailing-whitespace
        name: Remover espaços em branco

      # Remove espaços em branco no final dos arquivos
      - id: end-of-file-fixer
        name: Adicionar nova linha no final

      # Ordena imports
      - id: name-tests-test
        name: Verificar nomes de testes
        args: ['--pytest']

  # Black - Formatação de código Python
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: Formatar código com Black
        language_version: python3.11
        args: ['--line-length=100']

  # isort - Ordenação de imports
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Ordenar imports com isort
        args: ['--profile=black', '--line-length=100']

  # Flake8 - Linting de código Python
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Verificar código com Flake8
        args: ['--max-line-length=100', '--extend-ignore=E203,W503,E501']

  # MyPy - Verificação de tipos
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Verificar tipos com MyPy
        args: ['--ignore-missing-imports', '--no-strict-optional']
        additional_dependencies: [types-requests]

  # Bandit - Verificação de segurança
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Verificar segurança com Bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']

  # Prettier - Formatação de arquivos não-Python
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Formatar com Prettier
        types_or: [yaml, markdown, html, css, scss, javascript, json]
        args: ['--write']

  # Check-docstring-first - Verifica se docstrings vêm antes do código
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-docstring-first
        name: Verificar docstrings

  # Debug statements - Verifica se há debug statements no código
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: debug-statements
        name: Verificar debug statements

  # Detect-private-key - Verifica se há chaves privadas no código
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
        name: Verificar chaves privadas

# Configuração global
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
